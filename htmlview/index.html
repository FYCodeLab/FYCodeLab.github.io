<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HTML Test Tool</title>
  <style>
    :root {
      --bg-main: #121214;
      --bg-sidebar: #1a1a1e;
      --bg-input: #26262b;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-primary: #3b82f6;
      --accent-primary-hover: #2563eb;
      --accent-success: #10b981;
      --accent-success-hover: #059669;
      --accent-warning: #f59e0b;
      --accent-warning-hover: #d97706;
      --border-color: #374151;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
    }

    #appContainer {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100vw;
    }

    #controller {
      width: 420px;
      min-width: 340px;
      background: var(--bg-sidebar);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
    }

    h2 {
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .description {
      font-size: 0.85rem;
      line-height: 1.4;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .textarea-wrapper {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 1.25rem;
      min-height: 200px;
    }

    textarea {
      width: 100%;
      flex-grow: 1;
      background-color: var(--bg-input);
      color: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'Fira Code', Consolas, Monaco, monospace;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      -webkit-appearance: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.85rem 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-appearance: none;
    }

    .btn-primary { background-color: var(--accent-primary); color: white; }
    .btn-primary:hover { background-color: var(--accent-primary-hover); }

    .btn-success { background-color: var(--accent-success); color: white; }
    .btn-success:hover { background-color: var(--accent-success-hover); }

    .btn-warning { background-color: var(--accent-warning); color: white; }
    .btn-warning:hover { background-color: var(--accent-warning-hover); }

    .btn-secondary { background-color: #4b5563; color: white; }
    .btn-secondary:hover { background-color: #374151; }

    footer {
      margin-top: auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      text-align: center;
      color: var(--text-muted);
    }

    footer a {
      color: var(--accent-primary);
      text-decoration: none;
    }

    #previewContainer {
      flex-grow: 1;
      background: #fff;
      height: 100%;
    }

    iframe#previewIframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    @media (max-width: 768px) {
      #appContainer {
        flex-direction: column;
        height: auto;
        overflow-y: auto;
      }
      #controller {
        width: 100%;
        min-width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        overflow-y: visible;
      }
      .textarea-wrapper {
        min-height: 250px;
      }
      #previewContainer {
        width: 100%;
        height: 400px;
      }
    }
  </style>
</head>
<body onload="document.getElementById('htmlInput').focus();">

  <div id="appContainer">
    <div id="controller">
      <h2>HTML Tester</h2>
      <p class="description">
        Paste code to check errors in Safe Mode. Generate a ChatGPT prompt instantly if issues break your layout.
      </p>

      <div class="textarea-wrapper">
        <textarea id="htmlInput" placeholder=""></textarea>
      </div>
      
      <div class="actions-grid">
        <button class="btn-primary" onclick="renderInIframe()">Render (Safe Mode)</button>
        <button class="btn-success" onclick="replaceEntirePage()">Open New Tab</button>
        <button class="btn-warning" onclick="ChatGPT()">ChatGPT Prompt</button>
        <button class="btn-secondary" onclick="Download()">Download HTML</button>
      </div>

      <footer>
        Original code from <a href="https://github.com/uni928/TestSpeedy" target="_blank" rel="noopener noreferrer">github.com/uni928/TestSpeedy</a>
      </footer>
    </div>

    <div id="previewContainer">
      <iframe id="previewIframe" title="Live Preview Output"></iframe>
    </div>
  </div>

  <script>
    let capturedErrors = [];

    function Download() {
      const date = new Date();
      date.setTime(date.getTime() - date.getTimezoneOffset() * 60 * 1000);
      const str_date = date.toISOString().replace('T', ' ').substring(0,19);
      const textarea = document.getElementById("htmlInput");
      const fileName = str_date + "_GeneratedHTML.html";
      
      if (typeof window.showSaveFilePicker !== 'function') {
        const blob = new Blob([textarea.value], {type:"text/plain"});
        let downloadTag = document.createElement('a');
        downloadTag.href = URL.createObjectURL(blob);
        downloadTag.download = fileName;
        downloadTag.click();
      } else {
        let downloadTag = document.createElement('a');
        downloadTag.addEventListener('click', async () => {
          const opts = {
            suggestedName: fileName,
            types: [{
              description: 'HTML file',
              accept: {'text/plain': ['.html']},
            }],
          };
          try {
            const handle = await window.showSaveFilePicker(opts);
            const writable = await handle.createWritable();
            await writable.write(textarea.value);
            await writable.close();
          } catch (e) {}
        });
        downloadTag.click();
      }
    }

    // Fixed for iOS: This function now executes clipboard copies immediately 
    // inside the user click routine so Safari allows access.
    function ChatGPT() {
      const htmlInput = document.getElementById("htmlInput");
      const lines = htmlInput.value.split('\n').map((line, i) => `${i + 1}: ${line}`).join('\n');
      
      // Look up any logs caught during previous renders
      const errorTextString = capturedErrors.filter(Boolean).join('\n') || "No concrete frontend layout errors logged, checking syntax.";
      
      const promptTemplate = `Can you help me identify the cause of the following errors and how to fix them?

${errorTextString}

Here is the content of the related HTML file:

\`\`\`html
${lines}
\`\`\`

If there are any key points or caveats, please include them too.`;

      navigator.clipboard.writeText(promptTemplate).then(() => {
        alert("ChatGPT prompt copied!");
      }).catch(err => {
        // Fallback for exceptional clipboard configurations
        alert("Clipboard failed: " + err);
      });

      // Synchronously kick off the refresh render block
      renderInIframe();
    }

    function renderInIframe() {
      const html = document.getElementById("htmlInput").value;
      const iframe = document.getElementById("previewIframe");

      const wrapped = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    .error-box-container {
      background-color: #fef2f2;
      border: 2px solid #ef4444;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #991b1b;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .error-box-title {
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .error-box-msg {
      font-family: monospace;
      background: #fca5a5;
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
      word-break: break-all;
    }
  </style>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const readableMsg = message + ' (Line: ' + lineno + ')';
      parent.postMessage({ type: 'sandbox-error', message: readableMsg }, '*');
      
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'error-box-container';
        div.innerHTML = '<div class="error-box-title">⚠️ Runtime Error Detected</div>' +
                        '<div class="error-box-msg">' + readableMsg + '</div>';
        document.body.insertBefore(div, document.body.firstChild);
      }, 50);
    };
  <\/script>
</head><body>
${html}
</body></html>`;

      iframe.srcdoc = wrapped;
    }

    // Keep updating the background logging reference table smoothly
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === 'sandbox-error') {
        if (!capturedErrors.includes(event.data.message)) {
          capturedErrors.push(event.data.message);
        }
      }
    });

    function replaceEntirePage() {
      const html = document.getElementById("htmlInput").value;
      const newTab = window.open("", "_blank");

      if (newTab) {
        newTab.document.open();
        newTab.document.write(html);
        newTab.document.close();
      } else {
        alert("Pop-up blocked! Please allow pop-ups for this site to open a new tab.");
      }
    }
  </script>
</body>
</html>
